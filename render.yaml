services:
  - type: web
    name:.ravenox
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: RAVENOX_STATE_DIR
        value: /data/.ravenox
      - key: RAVENOX_WORKSPACE_DIR
        value: /data/workspace
      - key: RAVENOX_GATEWAY_TOKEN
        generateValue: true
    disk:
      name:.ravenox-data
      mountPath: /data
      sizeGB: 1
